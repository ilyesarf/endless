<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ENDLESS — A survival world that learns who you are." />
  <title>ENDLESS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <div id="game-container">
      <!-- Canvas -->
      <div id="canvas-wrap">
        <canvas id="game-canvas"></canvas>
        <div id="narration-overlay" class="hidden"></div>
        <div id="mission-prompt" class="hidden">
          <div id="mission-prompt-title"></div>
          <div id="mission-prompt-objective"></div>
        </div>
      </div>

      <!-- Text Panel -->
      <div id="text-panel">
        <div id="panel-header">
          <span class="panel-title">ENDLESS</span>
          <span id="connection-status" class="status-dot disconnected"></span>
        </div>
        <div id="narrative-log"></div>
        <div id="active-mission-panel">
          <div class="section-label">ACTIVE MISSION</div>
          <div id="active-mission-content">Awaiting first signal...</div>
        </div>
      </div>
    </div>

    <!-- Bottom Bar / HUD -->
    <div id="bottom-bar">
      <div id="energy-hud">
        <span class="bar-label">ENERGY</span>
        <div id="energy-bar-wrap">
          <div id="energy-bar-fill"></div>
        </div>
        <span id="energy-text">100</span>
      </div>
      <div class="stat-group">
        <div class="stat-item">
          <span class="bar-label">SIGHT</span>
          <span id="stat-sight" class="stat-value">120</span>
        </div>
        <div class="stat-item">
          <span class="bar-label">SPEED</span>
          <span id="stat-speed" class="stat-value">3.0</span>
        </div>
        <div class="stat-item">
          <span class="bar-label">MEMORY</span>
          <span id="stat-memory" class="stat-value">0%</span>
        </div>
      </div>
      <div id="zone-info">
        <span class="bar-label">ZONE</span>
        <span id="zone-name">unknown</span>
      </div>
      <div id="session-depth">
        <span class="bar-label">DEPTH</span>
        <span id="depth-value">0</span>
      </div>
    </div>

    <!-- Game Over Overlay -->
    <div id="game-over" class="hidden">
      <div id="game-over-inner">
        <h1 id="game-over-title">THE VOID RECLAIMS</h1>
        <p id="game-over-subtitle">Your energy is spent.</p>
        <div id="game-over-summary"></div>
        <button id="game-over-restart">ENTER AGAIN</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
